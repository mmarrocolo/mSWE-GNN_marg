# Fine-tuning config — 100 m SFINCS run, small model for initial test on Delft Blue
# Dataset: ahr_river_v03_marg_additionalsrc_100m_cutpolygon

dataset_parameters:
  dataset_folder    : 'database/datasets'
  temporal_res      : 60
  train_dataset_name: 'ahr_river_v03_marg_additionalsrc_100m_cutpolygon'
  train_size        : 1
  val_prcnt         : 0
  test_dataset_name : 'ahr_river_v03_marg_additionalsrc_100m_cutpolygon'
  seed              : 0

# Scaler options: null, 'minmax', 'minmax_neg', or 'standard'
scalers:
  DEM_scaler        : 'standard'
  slope_scaler      : null
  area_scaler       : 'standard'
  edge_length_scaler: 'standard'
  edge_slope_scaler : null
  WD_scaler         : null
  V_scaler          : null

# node features
selected_node_features:
  slopes        : False
  slope         : False
  area          : True
  DEM           : True

# edge features
selected_edge_features:
  edge_length           : True
  edge_relative_distance: False
  edge_slope            : False

# temporal training dataset
temporal_dataset_parameters:
  rollout_steps : 40
  previous_t    : 3
  time_start    : 0
  time_stop     : -1

# Model — reduced size for initial test
models:
  model_type              : 'MSGNN'
  hid_features            : 64   # reduced from 64
  mlp_layers              : 3    # reduced from 3
  seed                    : 666
  learned_residuals       : True
  mlp_activation          : 'prelu'
  gnn_activation          : 'tanh'
  edge_mlp                : True
  normalize               : True
  with_filter_matrix      : True
  with_gradient           : True
  with_WL                 : True
  K                       : 4    # reduced from 4
  learned_pooling         : False
  skip_connections        : True

trainer_options:
  type_loss             : 'RMSE'
  only_where_water      : True
  batch_size            : 2     # reduced for longer rollouts
  conservation          : 0
  velocity_scaler       : 7
  curriculum_epoch      : 5      # reach rollout_steps=12 by epoch 55 (was 30→only reached 7/12)
  patience              : 300
  max_epochs            : 500

# learning rate — lower for fine-tuning
lr_info:
  learning_rate   : 0.001   # reduced from 0.003
  weight_decay    : 0
  gamma           : 0.7
  step_size       : 10      # reduced from 20

saved_model: 'results/finetuned_ahr.h5'
